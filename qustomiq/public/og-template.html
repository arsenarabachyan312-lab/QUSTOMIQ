<!DOCTYPE html>
<!--
  OG IMAGE TEMPLATE — QUSTOMIQ
  ─────────────────────────────────────────────────────────────
  To generate og-image.png:
  1. Open this file in Chrome
  2. Open DevTools → Device toolbar (Ctrl+Shift+M)
  3. Set custom size: 1200 × 630
  4. DevTools → ⋮ → "Capture screenshot"
  5. Save as public/og-image.png
  ─────────────────────────────────────────────────────────────
-->
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #050505;
    font-family: 'Space Grotesk', sans-serif;
    position: relative;
  }

  /* ── Grid texture ── */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* ── Radial glow ── */
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse 70% 80% at 80% 50%,
      rgba(16,185,129,0.18) 0%,
      rgba(16,185,129,0.06) 40%,
      transparent 70%
    );
  }

  /* ── Subtle dot cluster (right side) ── */
  .dots {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    width: 420px;
    height: 420px;
    background-image: radial-gradient(circle, rgba(16,185,129,0.35) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 80% 80% at center, black 40%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at center, black 40%, transparent 100%);
  }

  /* ── Content ── */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.22);
    border-radius: 50px;
    padding: 6px 16px;
    margin-bottom: 36px;
    width: fit-content;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #10B981;
    box-shadow: 0 0 10px #10B981;
    flex-shrink: 0;
  }

  .badge-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #10B981;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Logo */
  .logo {
    font-size: 88px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 28px;
    color: #F5F7F6;
  }

  .logo-iq {
    color: #10B981;
  }

  /* Tagline */
  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    color: #A7B0AE;
    letter-spacing: 0.02em;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  /* Services row */
  .services {
    display: flex;
    gap: 12px;
  }

  .service-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #A7B0AE;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 6px 12px;
  }

  /* Domain */
  .domain {
    position: absolute;
    bottom: 40px;
    left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
  }

  /* Right watermark */
  .watermark {
    position: absolute;
    right: 50px;
    bottom: 30px;
    font-size: 160px;
    font-weight: 700;
    letter-spacing: -0.06em;
    color: rgba(16,185,129,0.055);
    line-height: 1;
    user-select: none;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="dots"></div>

  <div class="watermark">IQ</div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">enterprise-разработка</span>
    </div>

    <div class="logo">
      QUSTOM<span class="logo-iq">IQ</span>
    </div>

    <div class="tagline">
      Системы, которые не ломаются
    </div>

    <div class="services">
      <span class="service-tag">SFA</span>
      <span class="service-tag">DMS</span>
      <span class="service-tag">AI-интеграции</span>
      <span class="service-tag">Enterprise</span>
    </div>
  </div>

  <div class="domain">qustomiq.ru</div>
</body>
</html>
